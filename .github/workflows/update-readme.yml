name: Update README

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests deep-translator

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python << 'EOF'
          import os, re, json, requests
          from datetime import datetime
          from deep_translator import GoogleTranslator

          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]
          repo_url = f"https://github.com/{repo}"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json"
          }

          def gh_get(url, params=None):
              try:
                  r = requests.get(url, headers=headers, params=params, timeout=25)
                  if r.status_code >= 400:
                      print("GitHub API error:", r.status_code, url, r.text[:300])
                  return r.json()
              except Exception as e:
                  print("GET failed:", url, e)
                  return {}

          def cached_get(url, cache_file, params=None):
              if os.path.exists(cache_file):
                  age = datetime.now().timestamp() - os.path.getmtime(cache_file)
                  if age < 3600:
                      try:
                          with open(cache_file, "r", encoding="utf-8") as f:
                              return json.load(f)
                      except Exception:
                          pass

              data = gh_get(url, params=params)

              with open(cache_file, "w", encoding="utf-8") as f:
                  json.dump(data, f)

              return data

          def replace_block(text, start, end, block):
              pattern = rf"<!-- {start} -->.*?<!-- {end} -->"
              if re.search(pattern, text, flags=re.DOTALL):
                  return re.sub(pattern, block, text, flags=re.DOTALL)
              return block + "\n\n" + text

          def force_lang_switch(text, lang):
              text = re.sub(
                  r"<!-- LANG_START -->.*?<!-- LANG_END -->",
                  "",
                  text,
                  flags=re.DOTALL
              )

              text = re.sub(
                  r"(?mi)^.*English version.*README\.en\.md.*\n?",
                  "",
                  text
              )

              text = re.sub(
                  r"(?mi)^.*Русская версия.*README\.md.*\n?",
                  "",
                  text
              )

              if lang == "ru":
                  switch = """<!-- LANG_START -->
          🇬🇧 [English version](README.en.md)
          <!-- LANG_END -->"""
              else:
                  switch = """<!-- LANG_START -->
          🇷🇺 [Русская версия](README.md)
          <!-- LANG_END -->"""

              return switch + "\n\n" + text.strip() + "\n"

          def translate_markdown(text):
              protected = {}

              def protect(match):
                  key = f"__PROTECTED_BLOCK_{len(protected)}__"
                  protected[key] = match.group(0)
                  return key

              text = re.sub(r"```.*?```", protect, text, flags=re.DOTALL)
              text = re.sub(r"<!-- STATS_START -->.*?<!-- STATS_END -->", protect, text, flags=re.DOTALL)
              text = re.sub(r"<!-- GRAPH_START -->.*?<!-- GRAPH_END -->", protect, text, flags=re.DOTALL)
              text = re.sub(r"<!-- ISSUES_START -->.*?<!-- ISSUES_END -->", protect, text, flags=re.DOTALL)
              text = re.sub(r"<!-- LANG_START -->.*?<!-- LANG_END -->", protect, text, flags=re.DOTALL)

              chunks = [text[i:i + 3000] for i in range(0, len(text), 3000)]
              out = []

              for chunk in chunks:
                  if not chunk.strip():
                      out.append(chunk)
                      continue

                  try:
                      translated = GoogleTranslator(source="ru", target="en").translate(chunk)
                      out.append(translated if translated else chunk)
                  except Exception as e:
                      print("Translate failed:", e)
                      out.append(chunk)

              result = "\n".join(out)

              for key, value in protected.items():
                  result = result.replace(key, value)

              result = re.sub(r"(?m)^##\s*", "## ", result)
              return result

          views = cached_get(
              f"https://api.github.com/repos/{repo}/traffic/views",
              ".cache_views.json",
              params={"per": "day"}
          )

          clones = cached_get(
              f"https://api.github.com/repos/{repo}/traffic/clones",
              ".cache_clones.json",
              params={"per": "day"}
          )

          gh_views = views.get("count", 0)
          gh_unique = views.get("uniques", 0)
          gh_clones = clones.get("count", 0)

          issues_api = f"https://api.github.com/repos/{repo}/issues"
          issues_list = gh_get(issues_api, params={"state": "open", "per_page": 100})

          view_issue = None
          if isinstance(issues_list, list):
              for i in issues_list:
                  if i.get("title") == "views-counter":
                      view_issue = i
                      break

          if not view_issue:
              view_issue = requests.post(
                  issues_api,
                  headers=headers,
                  json={"title": "views-counter", "body": "0"},
                  timeout=20
              ).json()

          try:
              local_views = int(view_issue.get("body", "0").strip())
          except Exception:
              local_views = 0

          local_views += 1

          if "number" in view_issue:
              requests.patch(
                  f"{issues_api}/{view_issue['number']}",
                  headers=headers,
                  json={"body": str(local_views)},
                  timeout=20
              )

          releases = cached_get(
              f"https://api.github.com/repos/{repo}/releases",
              ".cache_releases.json",
              params={"per_page": 100}
          )

          latest_release = None
          if isinstance(releases, list) and releases:
              latest_release = releases[0]

          dl_rel = 0
          dl_total = 0
          release_assets_count = 0

          if isinstance(releases, list):
              for release in releases:
                  assets = release.get("assets", [])
                  release_assets_count += len(assets)
                  release_sum = sum(a.get("download_count", 0) for a in assets)
                  dl_total += release_sum

              if latest_release:
                  dl_rel = sum(a.get("download_count", 0) for a in latest_release.get("assets", []))

          ri = cached_get(
              f"https://api.github.com/repos/{repo}",
              ".cache_repo.json"
          )

          stars = ri.get("stargazers_count", 0)
          forks = ri.get("forks_count", 0)

          updated_at = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          stats_block = f"""<!-- STATS_START -->
          <!-- auto-updated by GitHub Actions · {updated_at} -->

          [![Views local](https://img.shields.io/badge/Views_local-{local_views}-ff6900?style=for-the-badge&logo=github)]({repo_url})
          [![Views GitHub](https://img.shields.io/badge/Views_GitHub-{gh_views}-ff6900?style=for-the-badge&logo=github)]({repo_url})
          [![Unique visitors](https://img.shields.io/badge/Unique-{gh_unique}-blue?style=for-the-badge&logo=github)]({repo_url})
          [![Clones](https://img.shields.io/badge/Clones-{gh_clones}-purple?style=for-the-badge&logo=github)]({repo_url})
          [![Stars](https://img.shields.io/badge/Stars-{stars}-yellow?style=for-the-badge&logo=github)]({repo_url}/stargazers)
          [![Forks](https://img.shields.io/badge/Forks-{forks}-green?style=for-the-badge&logo=github)]({repo_url}/network/members)
          [![Downloads latest release](https://img.shields.io/badge/Downloads_latest_release-{dl_rel}-brightgreen?style=for-the-badge)]({repo_url}/releases/latest)
          [![Downloads total assets](https://img.shields.io/badge/Downloads_total_assets-{dl_total}-brightgreen?style=for-the-badge)]({repo_url}/releases)

          <!-- STATS_END -->"""

          print(f"Release assets found: {release_assets_count}")
          print(f"Latest release downloads: {dl_rel}")
          print(f"Total release asset downloads: {dl_total}")

          points = views.get("views", [])
          labels = [p["timestamp"][:10] for p in points] if points else [datetime.utcnow().date().isoformat()]
          counts = [p["count"] for p in points] if points else [0]

          chart = {
              "type": "line",
              "data": {
                  "labels": labels,
                  "datasets": [{
                      "label": "Views per day",
                      "data": counts,
                      "borderColor": "rgba(255,105,0,1)",
                      "backgroundColor": "rgba(255,105,0,0.15)",
                      "fill": True,
                      "tension": 0.25,
                      "pointRadius": 2
                  }]
              },
              "options": {
                  "responsive": False,
                  "maintainAspectRatio": False,
                  "plugins": {
                      "title": {"display": True, "text": f"GitHub Traffic · {repo}"},
                      "legend": {"display": False}
                  },
                  "scales": {
                      "y": {"beginAtZero": True, "ticks": {"precision": 0}},
                      "x": {"ticks": {"maxRotation": 0, "autoSkip": True, "maxTicksLimit": 7}}
                  },
                  "layout": {"padding": 4}
              }
          }

          payload = {
              "chart": chart,
              "width": 1200,
              "height": 180,
              "format": "png",
              "backgroundColor": "white"
          }

          r = requests.post("https://quickchart.io/chart", json=payload, timeout=30)
          if r.status_code == 200 and r.content:
              with open("traffic-views.png", "wb") as f:
                  f.write(r.content)
          else:
              print("QuickChart failed:", r.status_code, r.text[:300])

          graph_block = """<!-- GRAPH_START -->
          <p align="center">
            <img src="./traffic-views.png" width="100%" alt="GitHub Traffic">
          </p>
          <!-- GRAPH_END -->"""

          issues_raw = gh_get(
              f"https://api.github.com/repos/{repo}/issues",
              params={
                  "state": "open",
                  "per_page": 10,
                  "sort": "created",
                  "direction": "desc"
              }
          )

          issues = [
              i for i in issues_raw
              if isinstance(i, dict)
              and "pull_request" not in i
              and i.get("title") != "views-counter"
          ]

          issue_count = len(issues)

          def issue_cards(lang):
              if not issues:
                  if lang == "ru":
                      return """
          <p align="center">
            <b>Открытых issues нет.</b><br>
            <sub>Служебный issue <code>views-counter</code> скрыт из списка.</sub>
          </p>
          """
                  return """
          <p align="center">
            <b>No open issues.</b><br>
            <sub>The service issue <code>views-counter</code> is hidden from the list.</sub>
          </p>
          """

              cards = []
              for i in issues:
                  num = i["number"]
                  title = i["title"]
                  url = i["html_url"]
                  date = i["created_at"][:10]
                  labels = i.get("labels", [])

                  label_html = ""
                  if labels:
                      label_html = " ".join(
                          f"<code>{l.get('name', '')}</code>"
                          for l in labels[:5]
                      )

                  cards.append(f"""
          <tr>
            <td width="90"><a href="{url}"><b>#{num}</b></a></td>
            <td><b>{title}</b><br><sub>{label_html}</sub></td>
            <td width="120"><sub>{date}</sub></td>
          </tr>""")

              return """
          <table>
            <tr>
              <th align="left">Issue</th>
              <th align="left">Title</th>
              <th align="left">Created</th>
            </tr>
          """ + "\n".join(cards) + "\n</table>"

          issues_block_ru = f"""<!-- ISSUES_START -->
          <!-- auto-updated by GitHub Actions · {updated_at} -->

          ## Issues

          <p>
            <a href="{repo_url}/issues">
              <img alt="Open issues" src="https://img.shields.io/badge/Open_issues-{issue_count}-blue?style=for-the-badge&logo=github">
            </a>
            <a href="{repo_url}/issues/new/choose">
              <img alt="Create issue" src="https://img.shields.io/badge/Create_issue-new-success?style=for-the-badge&logo=github">
            </a>
          </p>

          <details open>
          <summary><b>Открытые issues</b></summary>

          {issue_cards("ru")}

          </details>

          <p>
            <a href="{repo_url}/issues/new/choose">Создать issue</a> ·
            <a href="{repo_url}/issues">Все issues</a>
          </p>

          <!-- ISSUES_END -->"""

          issues_block_en = f"""<!-- ISSUES_START -->
          <!-- auto-updated by GitHub Actions · {updated_at} -->

          ## Issues

          <p>
            <a href="{repo_url}/issues">
              <img alt="Open issues" src="https://img.shields.io/badge/Open_issues-{issue_count}-blue?style=for-the-badge&logo=github">
            </a>
            <a href="{repo_url}/issues/new/choose">
              <img alt="Create issue" src="https://img.shields.io/badge/Create_issue-new-success?style=for-the-badge&logo=github">
            </a>
          </p>

          <details open>
          <summary><b>Open issues</b></summary>

          {issue_cards("en")}

          </details>

          <p>
            <a href="{repo_url}/issues/new/choose">Create new issue</a> ·
            <a href="{repo_url}/issues">All issues</a>
          </p>

          <!-- ISSUES_END -->"""

          with open("README.md", "r", encoding="utf-8") as f:
              ru = f.read()

          ru = force_lang_switch(ru, "ru")
          ru = replace_block(ru, "STATS_START", "STATS_END", stats_block)
          ru = replace_block(ru, "GRAPH_START", "GRAPH_END", graph_block)
          ru = replace_block(ru, "ISSUES_START", "ISSUES_END", issues_block_ru)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(ru)

          en = translate_markdown(ru)
          en = force_lang_switch(en, "en")
          en = replace_block(en, "STATS_START", "STATS_END", stats_block)
          en = replace_block(en, "GRAPH_START", "GRAPH_END", graph_block)
          en = replace_block(en, "ISSUES_START", "ISSUES_END", issues_block_en)

          with open("README.en.md", "w", encoding="utf-8") as f:
              f.write(en)

          print("README.md and README.en.md updated")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md README.en.md traffic-views.png || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update README stats, graph, issues and translation [skip ci]"

          git pull --rebase
          git push
